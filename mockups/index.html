<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>entropy c — concept studies</title>
  <style>
    :root { color-scheme: dark; --orange: #f6821f; --ink: #f5f7fa; --muted: #9ca8b8; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #070a0f; color: var(--ink); font: 16px/1.5 system-ui, sans-serif; }
    main { width: min(1440px, 100%); margin: auto; padding: 64px 24px 96px; }
    header { margin-bottom: 48px; }
    h1 { margin: 0; font-size: clamp(48px, 9vw, 112px); line-height: .85; letter-spacing: -.07em; }
    header p { max-width: 680px; color: var(--muted); font-size: 20px; }
    .tag { color: var(--orange); font-size: 12px; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; }
    .grid { display: grid; gap: 48px; }
    figure { margin: 0; overflow: hidden; border: 1px solid #252d39; border-radius: 20px; background: #10151d; }
    img { display: block; width: 100%; height: auto; }
    figcaption { padding: 20px 24px 24px; }
    h2 { margin: 0 0 5px; font-size: 22px; }
    figcaption p { margin: 0; color: var(--muted); }
    @media (min-width: 960px) { .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="tag">Industrial design exploration · Rev 0.1</div>
      <h1>entropy c</h1>
      <p>Four visual languages for a portable optical entropy experiment: product visualization, whiteboard ideation, engineering blueprint, and technical ink cutaway.</p>
    </header>
    <section class="grid">
      <figure>
        <img src="container-store-concept.jpg" alt="Concept built in an off-the-shelf acrylic display cube">
        <figcaption><h2>Selected enclosure study — 311 × 197 × 197 mm</h2><p>Based on the $31.99 Luxe Acrylic Football Display Cube from The Container Store. Its tight-fitting lid becomes the bottom; a removable black insert carries the complete mechanism. The image explores scale and packaging only—the mirror rotor and projection path need another visual iteration.</p></figcaption>
      </figure>
      <figure>
        <img src="enclosure-mirror.jpg" alt="Optical path form study inside an acrylic display cover">
        <figcaption><h2>Optical-path study</h2><p>One moving faceted mirror transforms ambient light, a fixed dichroic tile adds spatial color, and a hooded camera sees only a frosted projection plane. One optical assembly replaces the earlier five decorative prisms.</p></figcaption>
      </figure>
    </section>
  </main>
</body>
</html>
