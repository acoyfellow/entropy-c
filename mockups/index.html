<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>entropy c — concept studies</title>
  <style>
    :root { color-scheme: dark; --orange: #f6821f; --ink: #f5f7fa; --muted: #9ca8b8; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #070a0f; color: var(--ink); font: 16px/1.5 system-ui, sans-serif; }
    main { width: min(1440px, 100%); margin: auto; padding: 64px 24px 96px; }
    header { margin-bottom: 48px; }
    h1 { margin: 0; font-size: clamp(48px, 9vw, 112px); line-height: .85; letter-spacing: -.07em; }
    header p { max-width: 680px; color: var(--muted); font-size: 20px; }
    .tag { color: var(--orange); font-size: 12px; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; }
    .grid { display: grid; gap: 48px; }
    figure { margin: 0; overflow: hidden; border: 1px solid #252d39; border-radius: 20px; background: #10151d; }
    img { display: block; width: 100%; height: auto; }
    figcaption { padding: 20px 24px 24px; }
    h2 { margin: 0 0 5px; font-size: 22px; }
    figcaption p { margin: 0; color: var(--muted); }
    @media (min-width: 960px) { .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="tag">Industrial design exploration · Rev 0.1</div>
      <h1>entropy c</h1>
      <p>Four visual languages for a portable optical entropy experiment: product visualization, whiteboard ideation, engineering blueprint, and technical ink cutaway.</p>
    </header>
    <section class="grid">
      <figure>
        <img src="hero.jpg" alt="Photorealistic product concept for entropy c">
        <figcaption><h2>01 — Product visualization</h2><p>Clear optical chamber, restrained orange illumination, embedded status display, carry handle, and plausible tabletop scale.</p></figcaption>
      </figure>
      <div class="pair">
        <figure>
          <img src="whiteboard.jpg" alt="Industrial designer whiteboard studies for entropy c">
          <figcaption><h2>02 — Whiteboard study</h2><p>Form, service access, suspension, camera field of view, and portability explored as an industrial-design sheet.</p></figcaption>
        </figure>
        <figure>
          <img src="blueprint.jpg" alt="Engineering blueprint views for entropy c">
          <figcaption><h2>03 — Blueprint</h2><p>Orthographic packaging study for the chamber, actuators, controller, ports, cable routing, and handle.</p></figcaption>
        </figure>
      </div>
      <figure>
        <img src="cutaway.jpg" alt="Technical ink cutaway illustration for entropy c">
        <figcaption><h2>04 — Ink cutaway</h2><p>A quieter technical illustration emphasizing assembly logic and the relationship between optics, sensing, actuation, and compute.</p></figcaption>
      </figure>
    </section>
  </main>
</body>
</html>
